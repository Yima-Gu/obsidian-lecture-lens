name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            attestations: write
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Verify tag matches manifest version
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  version="$(node -p "require('./manifest.json').version")"
                  if [ "$tag" != "$version" ]; then
                      echo "::error::Tag '$tag' must match manifest.json version '$version' (Obsidian requirement)."
                      exit 1
                  fi

            - name: Verify release artifacts
              run: |
                  set -e
                  for file in main.js manifest.json styles.css transformers.min.js ort-wasm-simd.wasm ort-wasm.wasm; do
                      if [ ! -f "$file" ]; then
                          echo "::error::Missing release artifact: $file"
                          exit 1
                      fi
                  done
                  shopt -s nullglob
                  workers=(pdf.worker*.min.mjs)
                  if [ ${#workers[@]} -eq 0 ]; then
                      echo "::error::Missing release artifact: pdf.worker*.min.mjs"
                      exit 1
                  fi
                  echo "Release artifacts:"
                  ls -lh main.js manifest.json styles.css transformers.min.js ort-wasm-simd.wasm ort-wasm.wasm "${workers[@]}"

            - name: Attest release artifacts
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      styles.css

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  assets=(
                      main.js
                      manifest.json
                      styles.css
                      transformers.min.js
                      ort-wasm-simd.wasm
                      ort-wasm.wasm
                      pdf.worker*.min.mjs
                  )
                  if gh release view "$tag" >/dev/null 2>&1; then
                      echo "Release $tag already exists — uploading build artifacts."
                      gh release upload "$tag" --clobber "${assets[@]}"
                  else
                      gh release create "$tag" \
                          --title "$tag" \
                          --generate-notes \
                          "${assets[@]}"
                  fi
